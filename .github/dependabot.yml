version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    # Stay on current majors: only minor/patch bumps are proposed.
    # Major upgrades are handled deliberately, not by Dependabot.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
